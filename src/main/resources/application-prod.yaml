spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20 # Higher pool for prod load
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update # Never auto-migrate in prod
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics # Restrict in prod
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    com.devofblue: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000
    refresh-expiration-ms: 86400000
  admin:
    seed-enabled: ${ADMIN_SEED_ENABLED}
    name: ${ADMIN_NAME}
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

server:
  port: ${PORT:8088}
